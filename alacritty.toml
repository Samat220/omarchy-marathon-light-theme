# Marathon-Light — alacritty colors
# Vibrant Marathon palette on near-white. Normal slots darkened for usability
# as backgrounds; bright slots carry full neon Marathon hues.

[colors.primary]
background = "#FAFAFA"
foreground = "#1F1F1F"

[colors.cursor]
text = "#FAFAFA"
cursor = "#EA027E"

[colors.vi_mode_cursor]
