# Marathon-Light — Ghostty config (full Marathon neon, brand-first)
#
# DESIGN CHOICE: Marathon's authentic palette is neon-bright (acid yellow-
# green #C2FE0B, neon cyan #01FFFF, hot orange #FF5500). These colors have
# inherently low contrast on a white background. We prioritize BRAND IDENTITY
# over WCAG contrast — both the dark and light themes use the *exact same*
# Marathon hex values. The only difference between the themes is which side
# the void-vs-paper sits on.
#
# Tradeoff: TUI apps that put light/white text on top of these colors
# (notably git diff +/- blocks, Claude Code's diff renderer) will be hard
# to read on the light theme. Use the dark theme for diff-heavy work.

background = #FAFAFA
foreground = #1F1F1F
cursor-color = #EA027E
selection-background = #EA027E
selection-foreground = #FAFAFA

# Full Marathon palette — identical to the dark theme's signature colors
palette = 0=#0D1017
palette = 1=#EA027E
palette = 2=#C2FE0B
palette = 3=#FF5500
palette = 4=#3601FB
palette = 5=#EA027E
palette = 6=#01FFFF
palette = 7=#1F1F1F
palette = 8=#3D3D3D
palette = 9=#FF3399
palette = 10=#D4FF0D
palette = 11=#FF7733
palette = 12=#6644FF
palette = 13=#FF44CC
palette = 14=#44FFEE
palette = 15=#000000

# 256-color grayscale ramp — inverted for light bg, so apps using xterm
# greys for dim text get dark greys instead of washing out
palette = 232=#0F0F0F
palette = 233=#141414
